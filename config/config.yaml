app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: true
  preset: "morning_evening"

platforms:
  enabled: true
  sources:
    - id: "toutiao"
      name: "今日头条"
    - id: "baidu"
      name: "百度热搜"
    - id: "weibo"
      name: "微博"
    - id: "zhihu"
      name: "知乎"
    - id: "douyin"
      name: "抖音"
    - id: "bilibili-hot-search"
      name: "B站热搜"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "cls-hot"
      name: "财联社"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1
  feeds:
    - id: "hacker-news"
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"

report:
  mode: "current"
  display_mode: "keyword"
  rank_threshold: 5

notification:
  enabled: true
  channels:
    ntfy:
      server_url: "https://ntfy.sh"
      topic: "asa-trend-guoruan8"
      token: ""

ai:
  model: "deepseek/deepseek-chat"
  api_key: ""
  api_base: ""
  timeout: 120

ai_analysis:
  enabled: true
  language: "Chinese"

ai_translation:
  enabled: false