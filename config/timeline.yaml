# ═══════════════════════════════════════════════════════════════
#              时间线配置 - 每天推送时机
# ═══════════════════════════════════════════════════════════════

# morning_evening 模板：早报 + 晚报

timeline:
  - time_range: "08:00-12:00"
    report_mode: "current"
    notify: true
    analyze: true
    push: true
    title: "☕ 早间热点速览"

  - time_range: "12:00-14:00"
    report_mode: "current"
    notify: true
    analyze: false
    push: true
    title: "🍚 午间热点"

  - time_range: "14:00-18:00"
    report_mode: "incremental"
    notify: true
    analyze: false
    push: true
    title: "📡 下午动态"

  - time_range: "18:00-22:00"
    report_mode: "current"
    notify: true
    analyze: true
    push: true
    title: "🌙 晚间热点"

  - time_range: "22:00-08:00"
    report_mode: "incremental"
    notify: false
    analyze: false
    push: false
    title: "🌙 夜间模式（不推送）"
